name: "\U0001F680 Deploy to Live FTP"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTPS
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Generate one-time cache-clear hook"
        id: hook
        run: |
          TOKEN=$(echo "${{ github.sha }}${{ github.run_id }}" | sha256sum | cut -c1-40)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          sed "s/__DEPLOY_TOKEN__/$TOKEN/" deploy-hook-template.php > deploy-hook.php

      - name: "Deploy to FTP server"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          server-dir: ${{ secrets.REMOTE_PATH }}
          protocol: ftp
          exclude: |
            .env
            .env.*
            uploads/**
            vendor/**
            storage/**
            bootstrap/cache/packages.php
            bootstrap/cache/services.php
            .ftpquota
            .ftp-deploy-sync-state.json
            deploy-hook-template.php

      - name: "Clear server cache via deploy hook"
        run: |
          sleep 15
          curl -sf "https://digitizingzone.com/deploy-hook.php?t=${{ steps.hook.outputs.token }}" \
            && echo "Cache cleared" \
            || echo "Cache hook did not respond - run: php artisan view:clear"
